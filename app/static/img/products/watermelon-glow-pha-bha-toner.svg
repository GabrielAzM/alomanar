<svg xmlns='http://www.w3.org/2000/svg' width='900' height='900' viewBox='0 0 480 480' role='img' aria-labelledby='title desc'>
<title>Tonico Watermelon Glow PHA+BHA</title>
<desc>Packshot em fundo de estudio para o produto Tonico Watermelon Glow PHA+BHA.</desc>
<defs>
  <linearGradient id='bg' x1='0%' y1='0%' x2='0%' y2='100%'>
    <stop offset='0%' stop-color='#fbfff9'/>
    <stop offset='100%' stop-color='#ffffff'/>
  </linearGradient>
  <linearGradient id='packBody' x1='0%' y1='0%' x2='100%' y2='100%'>
    <stop offset='0%' stop-color='#5aa27a'/>
    <stop offset='100%' stop-color='#e4bb6c'/>
  </linearGradient>
  <filter id='shadow' x='-50%' y='-50%' width='200%' height='220%'>
    <feDropShadow dx='0' dy='18' stdDeviation='16' flood-color='#1f1017' flood-opacity='0.22'/>
  </filter>
  <filter id='blur'><feGaussianBlur stdDeviation='12'/></filter>
</defs>
<rect width='480' height='480' fill='url(#bg)'/>
<ellipse cx='240' cy='416' rx='128' ry='24' fill='#ceb8be' opacity='0.38' filter='url(#blur)'/>
<circle cx='110' cy='90' r='66' fill='#d9f0df' opacity='0.55'/>
<circle cx='382' cy='124' r='44' fill='#c8e8d2' opacity='0.5'/>
<rect x='70' y='36' width='340' height='408' rx='42' fill='rgba(255,255,255,0.56)' stroke='rgba(122, 30, 58, 0.05)'/>

        <g filter='url(#shadow)'>
          <rect x='168' y='132' width='144' height='410' rx='42' fill='url(#packBody)'/>
          <rect x='214' y='84' width='52' height='72' rx='16' fill='#2c6b4d'/>
          <rect x='186' y='232' width='108' height='150' rx='18' fill='rgba(255,255,255,0.94)'/>
          <text x='240' y='246' text-anchor='middle' fill='#2c6b4d' font-size='18' font-family='Montserrat, Arial, sans-serif' font-weight='700' letter-spacing='2'>GLOW RECIPE</text><text x='240' y='272' text-anchor='middle' fill='#2c6b4d' opacity='0.7' font-size='11' font-family='Lato, Arial, sans-serif'>TONICO</text><text x='240' y='306' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>Tonico</text><text x='240' y='326' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>Watermelon Glow</text><text x='240' y='346' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>PHA+BHA</text><text x='240' y='376' text-anchor='middle' fill='#2c6b4d' opacity='0.7' font-size='11' font-family='Lato, Arial, sans-serif'>150 ml</text>
        </g>
        
</svg>
