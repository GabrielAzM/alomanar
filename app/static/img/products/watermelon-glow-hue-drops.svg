<svg xmlns='http://www.w3.org/2000/svg' width='900' height='900' viewBox='0 0 480 480' role='img' aria-labelledby='title desc'>
<title>Serum Glow Watermelon Hue Drops</title>
<desc>Packshot em fundo de estudio para o produto Serum Glow Watermelon Hue Drops.</desc>
<defs>
  <linearGradient id='bg' x1='0%' y1='0%' x2='0%' y2='100%'>
    <stop offset='0%' stop-color='#fbfff9'/>
    <stop offset='100%' stop-color='#ffffff'/>
  </linearGradient>
  <linearGradient id='packBody' x1='0%' y1='0%' x2='100%' y2='100%'>
    <stop offset='0%' stop-color='#5aa27a'/>
    <stop offset='100%' stop-color='#cca407'/>
  </linearGradient>
  <filter id='shadow' x='-50%' y='-50%' width='200%' height='220%'>
    <feDropShadow dx='0' dy='18' stdDeviation='16' flood-color='#1f1017' flood-opacity='0.22'/>
  </filter>
  <filter id='blur'><feGaussianBlur stdDeviation='12'/></filter>
</defs>
<rect width='480' height='480' fill='url(#bg)'/>
<ellipse cx='240' cy='416' rx='128' ry='24' fill='#ceb8be' opacity='0.38' filter='url(#blur)'/>
<circle cx='110' cy='90' r='66' fill='#d9f0df' opacity='0.55'/>
<circle cx='382' cy='124' r='44' fill='#c8e8d2' opacity='0.5'/>
<rect x='70' y='36' width='340' height='408' rx='42' fill='rgba(255,255,255,0.56)' stroke='rgba(122, 30, 58, 0.05)'/>

        <g filter='url(#shadow)'>
          <rect x='170' y='182' width='140' height='332' rx='34' fill='url(#packBody)'/>
          <rect x='206' y='94' width='68' height='120' rx='22' fill='#2c6b4d'/>
          <rect x='220' y='64' width='40' height='40' rx='12' fill='#2c6b4d' opacity='0.82'/>
          <rect x='188' y='252' width='104' height='120' rx='18' fill='rgba(255,255,255,0.94)'/>
          <text x='240' y='246' text-anchor='middle' fill='#2c6b4d' font-size='18' font-family='Montserrat, Arial, sans-serif' font-weight='700' letter-spacing='2'>GLOW RECIPE</text><text x='240' y='272' text-anchor='middle' fill='#2c6b4d' opacity='0.7' font-size='11' font-family='Lato, Arial, sans-serif'>SERUM GLOW</text><text x='240' y='306' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>Serum Glow</text><text x='240' y='326' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>Watermelon Hue</text><text x='240' y='346' text-anchor='middle' fill='#2c6b4d' font-size='16' font-family='Montserrat, Arial, sans-serif' font-weight='600'>Drops</text><text x='240' y='376' text-anchor='middle' fill='#2c6b4d' opacity='0.7' font-size='11' font-family='Lato, Arial, sans-serif'>40 ml</text>
        </g>
        
</svg>
